<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f39c12;
            --bg-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333;
            --ball-size: 50px;
            --header-color: #4a90e2;
            --footer-color: #888;
        }

        [data-theme='dark'] {
            --bg-color: #1a1a1a;
            --container-bg: #2d2d2d;
            --text-color: #f4f4f4;
            --header-color: #69c8f2;
            --footer-color: #aaa;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            background: var(--container-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            transition: background-color 0.3s;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            color: var(--text-color);
        }

        h1 {
            margin-bottom: 2rem;
            color: var(--header-color);
            font-weight: 700;
        }

        .numbers-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            min-height: var(--ball-size);
        }

        .ball {
            width: var(--ball-size);
            height: var(--ball-size);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.5s ease forwards;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Lotto Ball Colors */
        .ball-range-1 { background-color: #fbc400; text-shadow: 0 1px 2px rgba(0,0,0,0.2); } /* 1-10 */
        .ball-range-2 { background-color: #69c8f2; text-shadow: 0 1px 2px rgba(0,0,0,0.2); } /* 11-20 */
        .ball-range-3 { background-color: #ff7272; text-shadow: 0 1px 2px rgba(0,0,0,0.2); } /* 21-30 */
        .ball-range-4 { background-color: #aaa; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }    /* 31-40 */
        .ball-range-5 { background-color: #b0d840; text-shadow: 0 1px 2px rgba(0,0,0,0.2); } /* 41-45 */

        .draw-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-weight: 600;
            outline: none;
        }

        .draw-btn:hover {
            background-color: #357abd;
        }

        .draw-btn:active {
            transform: scale(0.95);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--footer-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <button id="themeToggle" class="theme-toggle" title="테마 전환">🌓</button>
        <h1>로또 번호 추첨</h1>
        <div id="numbers" class="numbers-container">
            <!-- Numbers will appear here -->
        </div>
        <button id="drawBtn" class="draw-btn">번호 추첨하기</button>
        <div class="footer">
            행운을 빕니다! <br>
            <a href="affiliate.html" style="color: var(--primary-color); text-decoration: none; margin-top: 10px; display: inline-block; font-weight: 600;">제휴 문의하기</a>
        </div>
    </div>

    <!-- Disqus Comment Section -->
    <div style="max-width: 500px; width: 90%; margin: 2rem auto; padding: 2rem; background: var(--container-bg); border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: background-color 0.3s;">
        <div id="disqus_thread"></div>
    </div>

    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
        /*
        var disqus_config = function () {
        this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://product-builder-re5uprrr0v.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

    <script>
        const numbersContainer = document.getElementById('numbers');
        const drawBtn = document.getElementById('drawBtn');
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        // Theme logic
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            body.setAttribute('data-theme', 'dark');
        }

        themeToggle.addEventListener('click', () => {
            const isDark = body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        function getBallClass(num) {
            if (num <= 10) return 'ball-range-1';
            if (num <= 20) return 'ball-range-2';
            if (num <= 30) return 'ball-range-3';
            if (num <= 40) return 'ball-range-4';
            return 'ball-range-5';
        }

        function drawLottoNumbers() {
            numbersContainer.innerHTML = '';
            const lottoNumbers = [];
            while (lottoNumbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!lottoNumbers.includes(num)) {
                    lottoNumbers.push(num);
                }
            }
            lottoNumbers.sort((a, b) => a - b);
            lottoNumbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallClass(num)}`;
                    ball.textContent = num;
                    numbersContainer.appendChild(ball);
                }, index * 150);
            });
        }

        drawBtn.addEventListener('click', drawLottoNumbers);
        drawLottoNumbers();
    </script>

</body>
</html>
